name: Backend CI

on: 
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
        
      - name: Run tests
        run: |
          pytest -v
